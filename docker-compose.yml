services:
  # 1. PostgreSQL Database
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-inference_platform}
    volumes:
      - ai-inference-platform-sdd_postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres} -d ${POSTGRES_DB:-inference_platform}" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

  # 2. Redis Cache
  redis-cache:
    image: redis:7-alpine
    container_name: redis-cache
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - platform-network

  # 2. FastAPI Backend
  api-backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: api-backend
    command: [ "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000" ]
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://postgres:${POSTGRES_PASSWORD:-postgres}@postgres-db:5432/inference_platform
      REDIS_URL: redis://redis-cache:6379/0
      # Reach host Ollama via proxy to bypass localhost restrictions
      OLLAMA_BASE_URL: http://host.docker.internal:11435
    ports:
      - "8000:8000"
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres-db:
        condition: service_healthy
      redis-cache:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - platform-network

  # 3. React/Vite Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      api-backend:
        condition: service_healthy
    networks:
      - platform-network

networks:
  platform-network:
    driver: bridge

volumes:
  ai-inference-platform-sdd_postgres_data:
    external: true
